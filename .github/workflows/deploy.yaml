name: Deploy to ec2

on: 
    push: 
        branches:
            - main
jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
          - name: SSH Deploy 
            uses: appleboy/ssh-action@v1.0.3
            with: 
                host: ${{secrets.EC2_HOST}}
                username: ubuntu
                key: ${{secrets.EC2_SSH_KEY}}
                script: |
                    cd ~/projects/siter
                    git pull origin main
                    pnpm install
                    pnpm run build
                    pm2 reload siter
